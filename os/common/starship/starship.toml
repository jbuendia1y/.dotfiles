# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 60
add_newline = false
command_timeout = 1200

format = """
[в–‘в–’в–“](#a3aed2)\
[ п…ј ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#769ff0 fg:#a3aed2)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$nodejs\
$deno\
$rust\
$golang\
$python\
$php\
[оӮҙ](fg:#212736 bg:#1d2230)\
$time\
[оӮҙ ](fg:#1d2230)\
"""

# Left -> оӮ°

# Can put /n$character 
# to add a newline and the common character start of starship
# $character is > of the start in the cmd

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "пҗ“"
"Documentos" = "пҗ“"
"Downloads" = "пҖҷ "
"Descargas" = "пҖҷ "
"Music" = "пҖҒ "
"MГәsica" = "пҖҒ "
"Pictures" = "пҖҫ "
"ImГЎgenes" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[deno]
symbol = "рҹҰ•"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R"                                      # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'
